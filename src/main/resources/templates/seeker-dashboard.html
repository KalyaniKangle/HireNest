<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - HireNest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/hirenest.css}" rel="stylesheet">
</head>
<body style="background:#F8F9FF;">

    <!-- Navbar -->
    <nav class="hirenest-navbar">
        <div class="container">
            <div class="d-flex justify-content-between
                        align-items-center">
                <a href="/" class="hirenest-logo">
                    Hire<span>Nest</span>
                </a>
                <div class="d-flex align-items-center
                            gap-3">
                    <span style="font-size:14px;
                                  color:#666;">
                        <i class="bi bi-person-circle
                                  me-1"></i>
                        Job Seeker
                    </span>
                    <a href="/logout"
                       class="btn btn-outline-primary
                              btn-sm">
                        <i class="bi bi-box-arrow-right
                                  me-1"></i>
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container"
         style="padding-top:100px;">
        <div class="text-center py-5">
            <div style="font-size:60px;
                         margin-bottom:20px;">
                🎓
            </div>
            <h2 style="font-weight:800;
                        color:#1A1A2E;">
                Welcome to HireNest!
            </h2>
            <p style="color:#6C757D;
                       font-size:16px;
                       margin-top:10px;">
                Your Job Seeker Dashboard is
                coming in Module 6
            </p>
            <div class="mt-4">
                <span style="background:#F0EFFE;
                              color:#6C63FF;
                              padding:8px 20px;
                              border-radius:20px;
                              font-size:14px;
                              font-weight:600;">
                    ✅ Login Successful —
                    JWT Authentication Working!
                </span>
            </div>
        </div>
    </div>

</body>
</html>
